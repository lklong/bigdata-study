# Spark 3.5.8 社区版 - 合并 EMR Spark 3.5.3 关键配置
# 保留 3.5.8 自己的 add-opens + JDK17 配置
# 加入 EMR 的 eventLog/history/tcmalloc/Kryo/Gluten 加速参数

# === Hadoop 兼容 ===
spark.hadoop.ipc.client.fallback-to-simple-auth-allowed  true

# === JDK17 add-opens（13 个完整清单 - 211 跑通） ===
spark.driver.extraJavaOptions   --add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.lang.invoke=ALL-UNNAMED --add-opens=jdk.unsupported/sun.misc=ALL-UNNAMED --add-opens=java.base/java.lang.reflect=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED --add-opens=java.base/java.net=ALL-UNNAMED --add-opens=java.base/java.util.concurrent=ALL-UNNAMED --add-opens=java.base/jdk.internal.misc=ALL-UNNAMED --add-opens=java.base/jdk.internal.ref=ALL-UNNAMED -Dio.netty.tryReflectionSetAccessible=true -Dlog4j.ignoreTCL=true -Dfile.encoding=utf-8
spark.executor.extraJavaOptions --add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.lang.invoke=ALL-UNNAMED --add-opens=jdk.unsupported/sun.misc=ALL-UNNAMED --add-opens=java.base/java.lang.reflect=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED --add-opens=java.base/java.net=ALL-UNNAMED --add-opens=java.base/java.util.concurrent=ALL-UNNAMED --add-opens=java.base/jdk.internal.misc=ALL-UNNAMED --add-opens=java.base/jdk.internal.ref=ALL-UNNAMED -Dio.netty.tryReflectionSetAccessible=true -Dlog4j.ignoreTCL=true -Dfile.encoding=utf-8

# === JDK17 路径透传（archive 分发） ===
spark.yarn.appMasterEnv.JAVA_HOME       /usr/lib/jvm/TencentKona-17.0.18.b1
spark.executorEnv.JAVA_HOME             /usr/lib/jvm/TencentKona-17.0.18.b1
spark.executorEnv.HADOOP_HOME           /usr/local/service/hadoop
spark.executorEnv.LD_LIBRARY_PATH       /usr/local/service/hadoop/lib/native:/usr/lib/jvm/TencentKona-17.0.18.b1/lib/server:/usr/lib/jvm/TencentKona-17.0.18.b1/lib
spark.executor.extraLibraryPath         /usr/local/service/hadoop/lib/native
spark.driver.extraLibraryPath           /usr/local/service/hadoop/lib/native:/usr/local/service/hadoop/lib/native/Linux-amd64-64/lib

# === EventLog & History（解决 history UI 找不到任务） ===
spark.eventLog.enabled    true
spark.eventLog.dir        hdfs://172.21.240.197:4007/spark-history
spark.history.fs.cleaner.enabled    true
spark.yarn.historyServer.address    http://172.21.240.197:10000

# === EMR 关键 Spark 加速 ===
spark.serializer    org.apache.spark.serializer.KryoSerializer
spark.shuffle.service.enabled    true
spark.executor.processTreeMetrics.enabled    true
spark.sql.broadcastTimeout    600s
spark.hadoop.yarn.timeline-service.enabled    false

# === EMR Hive 配置 ===
spark.hadoop.hive.metastore.dml.events    false
spark.sql.hive.convertInsertingPartitionedTable    false
spark.sql.hive.convertMetastoreOrc    false
spark.sql.hive.convertMetastoreParquet    false

# === Gluten Velox 配置（EMR 经验值） ===
spark.gluten.sql.parquet.timestampType.scan.fallback.enabled    true
spark.gluten.sql.native.writer.enabled    false
spark.gluten.sql.native.hive.writer.enabled    false
