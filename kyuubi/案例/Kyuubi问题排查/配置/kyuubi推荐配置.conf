# ============================================================
# Kyuubi 1.7.x 推荐配置模板
#
# 目标：解决引擎泄漏 + Session 残留 + 资源浪费问题
# 适用：Kyuubi 1.7.0 + Spark on YARN (yarn-cluster)
#       Engine Share Level = CONNECTION
#
# 使用方法：
#   1. 备份当前配置: cp $KYUUBI_HOME/conf/kyuubi-defaults.conf $KYUUBI_HOME/conf/kyuubi-defaults.conf.bak
#   2. 将本文件的内容合并到 $KYUUBI_HOME/conf/kyuubi-defaults.conf
#   3. 重启 Kyuubi: $KYUUBI_HOME/bin/kyuubi stop && sleep 5 && $KYUUBI_HOME/bin/kyuubi start
#
# 注意：请根据实际集群资源情况调整 Spark 资源参数
# ============================================================

# ======================================
# 一、Kyuubi Server 基础配置
# ======================================

# 前端 Thrift 绑定端口
kyuubi.frontend.thrift.binary.bind.port=10009

# ======================================
# 二、引擎共享与生命周期管理
# ======================================

# 引擎共享级别：每个连接一个独立引擎
# 优点：隔离性好，适合多租户
# 缺点：资源消耗大，需配合 idle timeout 使用
kyuubi.engine.share.level=CONNECTION

# 引擎类型
kyuubi.engine.type=SPARK_SQL

# 引擎无活跃 Session 后的存活时间
# ⚠️ 关键参数：防止引擎泄漏
# 默认 PT30M(30分钟)，缩短到 10 分钟以更快释放资源
# 如果有长时间空闲后需要快速重连的场景，可适当延长
kyuubi.engine.idle.timeout=PT10M

# ======================================
# 三、Session 管理（防止 Session 泄漏）
# ======================================

# 空闲 Session 超时时间
# ⚠️ 关键参数：默认 PT6H(6小时) 太长，缩短到 30 分钟
# 超过此时间无操作的 Session 会被自动关闭
kyuubi.session.idle.timeout=PT30M

# Session 超时检查间隔
# 每 5 分钟检查一次是否有过期 Session
kyuubi.session.check.interval=PT5M

# 引擎初始化超时
# ⚠️ 关键参数：默认无限等待，必须设置！
# 如果 YARN 资源不足导致引擎无法启动，3 分钟后超时返回错误
# 避免客户端永远卡住等待
kyuubi.session.engine.initialize.timeout=PT3M

# ======================================
# 四、高可用配置（如有 ZooKeeper）
# ======================================

# ZooKeeper 地址（请替换为实际地址）
# kyuubi.ha.addresses=zk1:2181,zk2:2181,zk3:2181

# ZooKeeper 命名空间
# kyuubi.ha.namespace=kyuubi

# ======================================
# 五、Spark 引擎参数
# ======================================
# 以下参数通过 Kyuubi 传递给 spark-submit

# Spark 部署模式
spark.submit.deployMode=cluster

# YARN 队列
# spark.yarn.queue=default

# ---- 资源限制（防止单引擎过度消耗）----

# Driver 资源
spark.driver.memory=1g
spark.driver.cores=1

# Executor 资源
spark.executor.memory=2g
spark.executor.cores=2
spark.executor.instances=2

# ---- 动态资源分配（空闲 Executor 及时回收）----

# 启用动态资源分配
spark.dynamicAllocation.enabled=true

# Executor 空闲 60 秒后回收
spark.dynamicAllocation.executorIdleTimeout=60s

# 最小 Executor 数（保留 1 个维持引擎存活）
spark.dynamicAllocation.minExecutors=1

# 最大 Executor 数（根据集群规模调整）
spark.dynamicAllocation.maxExecutors=10

# 需要启用 External Shuffle Service
spark.shuffle.service.enabled=true

# ---- YARN 配置 ----

# 减少 YARN 重试次数（快速失败，不要反复重试占资源）
spark.yarn.maxAppAttempts=1

# ---- Spark SQL 优化 ----

# 启用 AQE (Adaptive Query Execution)
spark.sql.adaptive.enabled=true

# 自适应合并小分区
spark.sql.adaptive.coalescePartitions.enabled=true

# ---- Hive Metastore 连接 ----

# 启用 Hive 支持
spark.sql.catalogImplementation=hive

# HMS Thrift 客户端超时（防止 HMS 不可达时卡死）
# spark.hadoop.hive.metastore.client.socket.timeout=60

# ---- 序列化 ----

spark.serializer=org.apache.spark.serializer.KryoSerializer

# ---- 日志 ----

# Spark 事件日志（便于通过 Spark History Server 排查）
# spark.eventLog.enabled=true
# spark.eventLog.dir=hdfs:///spark-logs

# ======================================
# 六、认证与安全（按需配置）
# ======================================

# 认证方式（NONE/LDAP/KERBEROS/CUSTOM）
# kyuubi.authentication=NONE

# ======================================
# 七、日志配置
# ======================================

# 操作日志根目录
# kyuubi.operation.log.dir.root=kyuubi_operation_logs
